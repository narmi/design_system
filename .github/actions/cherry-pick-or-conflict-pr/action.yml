name: "Cherry-pick or Conflict PR"
description: "Cherry-picks a commit onto the current branch. Opens a draft PR if there are conflicts."
inputs:
  merge_sha:
    description: "Commit SHA to cherry-pick"
    required: true
  short_sha:
    description: "Short SHA for branch naming"
    required: true
  branch:
    description: "Target maintenance branch"
    required: true
  target_version:
    description: "Major.Minor version (for naming)"
    required: true
  pr_number:
    description: "Original PR number (for references)"
    required: true
  token:
    description: "GitHub token for creating PRs"
    required: true
outputs:
  result:
    description: "Outcome: 'clean' or 'conflict'"
    value: ${{ steps.cherry_pick.outputs.result }}
runs:
  using: "composite"
  steps:
    - name: Cherry-pick commit
      id: cherry_pick
      shell: bash
      run: |
        if git cherry-pick ${{ inputs.merge_sha }} -m 1; then
          echo "result=clean" >> "$GITHUB_OUTPUT"
        else
          echo "result=conflict" >> "$GITHUB_OUTPUT"
          git cherry-pick --abort
        fi

    - name: Push clean cherry-pick
      if: steps.cherry_pick.outputs.result == 'clean'
      shell: bash
      run: |
        git push origin ${{ inputs.branch }}
        echo "### Backport successful" >> "$GITHUB_STEP_SUMMARY"
        echo "Cherry-picked PR #${{ inputs.pr_number }} (${{ inputs.short_sha }}) onto \`${{ inputs.branch }}\`." >> "$GITHUB_STEP_SUMMARY"
        echo "A release will be published automatically." >> "$GITHUB_STEP_SUMMARY"

    - name: Handle conflict — create PR
      if: steps.cherry_pick.outputs.result == 'conflict'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        CONFLICT_BRANCH="backport/${{ inputs.target_version }}.x/${{ inputs.short_sha }}"
        git checkout -b "$CONFLICT_BRANCH"

        git cherry-pick ${{ inputs.merge_sha }} -m 1 --no-commit || true
        git add -A
        git commit -m "fix: backport PR #${{ inputs.pr_number }} (conflicts need resolution)"
        git push origin "$CONFLICT_BRANCH"

        PR_URL=$(gh pr create \
          --base "${{ inputs.branch }}" \
          --head "$CONFLICT_BRANCH" \
          --title "fix: backport PR #${{ inputs.pr_number }} to ${{ inputs.target_version }}.x" \
          --body "Automated backport of PR #${{ inputs.pr_number }} to \`${{ inputs.branch }}\`.

        The cherry-pick had conflicts that need manual resolution.

        Original PR: #${{ inputs.pr_number }}
        Commit: ${{ inputs.merge_sha }}" \
          --draft)

        echo "### Backport needs manual resolution" >> "$GITHUB_STEP_SUMMARY"
        echo "Cherry-pick of PR #${{ inputs.pr_number }} onto \`${{ inputs.branch }}\` had conflicts." >> "$GITHUB_STEP_SUMMARY"
        echo "Draft PR created: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
