name: "Resolve PR Commit"
description: "Gets the merge commit SHA for a merged pull request"
inputs:
  pr_number:
    description: "PR number to resolve"
    required: true
  token:
    description: "GitHub token for API access"
    required: true
outputs:
  merge_sha:
    description: "Full merge commit SHA"
    value: ${{ steps.resolve.outputs.merge_sha }}
  short_sha:
    description: "Short (7-char) merge commit SHA"
    value: ${{ steps.resolve.outputs.short_sha }}
runs:
  using: "composite"
  steps:
    - name: Resolve merge commit from PR
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        MERGE_SHA=$(gh pr view ${{ inputs.pr_number }} --json mergeCommit --jq '.mergeCommit.oid')
        if [ -z "$MERGE_SHA" ]; then
          echo "::error::Could not resolve merge commit for PR #${{ inputs.pr_number }}. Is it merged?"
          exit 1
        fi
        echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
        echo "short_sha=${MERGE_SHA:0:7}" >> "$GITHUB_OUTPUT"
        echo "Resolved PR #${{ inputs.pr_number }} to merge commit $MERGE_SHA"
