name: Backport
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged PR number"
        required: true
        type: string
      target_version:
        description: "Target Major.Minor to patch (e.g., 6.12)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    name: Backport to maintenance/${{ inputs.target_version }}.x
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if ! echo "${{ inputs.target_version }}" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "::error::target_version must be in Major.Minor format (e.g., 6.12)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve merge commit from PR
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: |
          MERGE_SHA=$(gh pr view ${{ inputs.pr_number }} --json mergeCommit --jq '.mergeCommit.oid')
          if [ -z "$MERGE_SHA" ]; then
            echo "::error::Could not resolve merge commit for PR #${{ inputs.pr_number }}. Is it merged?"
            exit 1
          fi
          echo "merge_sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          echo "short_sha=${MERGE_SHA:0:7}" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #${{ inputs.pr_number }} to merge commit $MERGE_SHA"

      - name: Create or checkout maintenance branch
        id: branch
        run: |
          BRANCH="maintenance/${{ inputs.target_version }}.x"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            echo "Branch $BRANCH already exists, checking out"
            git checkout "$BRANCH"
          else
            echo "Branch $BRANCH does not exist, creating from latest tag"
            LATEST_TAG=$(git tag --sort=-v:refname --list "v${{ inputs.target_version }}.*" | head -n 1)
            if [ -z "$LATEST_TAG" ]; then
              echo "::error::No tag found matching v${{ inputs.target_version }}.* — cannot create maintenance branch"
              exit 1
            fi
            echo "Creating $BRANCH from $LATEST_TAG"
            git checkout -b "$BRANCH" "$LATEST_TAG"
            git push origin "$BRANCH"
          fi

      - name: Cherry-pick commit
        id: cherry_pick
        run: |
          if git cherry-pick ${{ steps.resolve.outputs.merge_sha }} -m 1; then
            echo "result=clean" >> "$GITHUB_OUTPUT"
          else
            echo "result=conflict" >> "$GITHUB_OUTPUT"
            git cherry-pick --abort
          fi

      - name: Push clean cherry-pick
        if: steps.cherry_pick.outputs.result == 'clean'
        run: |
          git push origin ${{ steps.branch.outputs.branch }}
          echo "### Backport successful" >> "$GITHUB_STEP_SUMMARY"
          echo "Cherry-picked PR #${{ inputs.pr_number }} (${{ steps.resolve.outputs.short_sha }}) onto \`${{ steps.branch.outputs.branch }}\`." >> "$GITHUB_STEP_SUMMARY"
          echo "A release will be published automatically." >> "$GITHUB_STEP_SUMMARY"

      - name: Handle conflict — create PR
        if: steps.cherry_pick.outputs.result == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: |
          CONFLICT_BRANCH="backport/${{ inputs.target_version }}.x/${{ steps.resolve.outputs.short_sha }}"
          git checkout -b "$CONFLICT_BRANCH"

          # Re-attempt cherry-pick, committing with conflict markers
          git cherry-pick ${{ steps.resolve.outputs.merge_sha }} -m 1 --no-commit || true
          git add -A
          git commit -m "fix: backport PR #${{ inputs.pr_number }} (conflicts need resolution)"
          git push origin "$CONFLICT_BRANCH"

          PR_URL=$(gh pr create \
            --base "${{ steps.branch.outputs.branch }}" \
            --head "$CONFLICT_BRANCH" \
            --title "fix: backport PR #${{ inputs.pr_number }} to ${{ inputs.target_version }}.x" \
            --body "Automated backport of PR #${{ inputs.pr_number }} to \`${{ steps.branch.outputs.branch }}\`.

          The cherry-pick had conflicts that need manual resolution.

          Original PR: #${{ inputs.pr_number }}
          Commit: ${{ steps.resolve.outputs.merge_sha }}" \
            --draft)

          echo "### Backport needs manual resolution" >> "$GITHUB_STEP_SUMMARY"
          echo "Cherry-pick of PR #${{ inputs.pr_number }} onto \`${{ steps.branch.outputs.branch }}\` had conflicts." >> "$GITHUB_STEP_SUMMARY"
          echo "Draft PR created: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
