# Updates snapshots in chromatic, using latest `main` as basleline
name: 'Chromatic Snapshot Baseline'
permissions:
  contents: read
on:
  push:
    branches:
      - main

jobs:
  chromatic_update_baseline:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version-file: ".nvmrc"
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts --loglevel=warn

      - name: Build
        run: npm run build && npm run build-storybook

      - name: Auto-accept chromatic snapshots from `main`
        uses: chromaui/action@c8eb1dde813a34d0e86b136d8c4faedd0a7351ab # v13
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          autoAcceptChanges: true
          exitZeroOnChanges: false
          buildScriptName: ''
          storybookBuildDir: './storybook-static'
