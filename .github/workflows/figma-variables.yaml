name: Figma Variables Sync

on:
  workflow_dispatch:
    inputs:
      file_key:
        description: 'Figma file key (from the file URL)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  fetch-figma-variables:
    name: (Beta) Fetch Figma Variables
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Figma variables
        env:
          FIGMA_TOKEN: ${{ secrets.NDS_FIGMA_TOKEN }}
          FILE_KEY: ${{ github.event.inputs.file_key }}
        run: |
          node ./scripts/figma-variables.mjs "$FILE_KEY"
