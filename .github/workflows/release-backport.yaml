name: Release Backport
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Merged PR number on main"
        required: true
        type: string
      target_version:
        description: "Target Major.Minor to patch (e.g., 6.12)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    name: Backport to maintenance/${{ inputs.target_version }}.x
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        run: |
          if ! echo "${{ inputs.target_version }}" | grep -qE '^[0-9]+\.[0-9]+$'; then
            echo "::error::target_version must be in Major.Minor format (e.g., 6.12)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve merge commit from PR
        id: resolve
        uses: ./.github/actions/resolve-pr-commit
        with:
          pr_number: ${{ inputs.pr_number }}
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Checkout maintenance branch
        id: branch
        uses: ./.github/actions/checkout-maintenance-branch
        with:
          target_version: ${{ inputs.target_version }}

      - name: Cherry-pick or create conflict PR
        uses: ./.github/actions/cherry-pick-or-conflict-pr
        with:
          merge_sha: ${{ steps.resolve.outputs.merge_sha }}
          short_sha: ${{ steps.resolve.outputs.short_sha }}
          branch: ${{ steps.branch.outputs.branch }}
          target_version: ${{ inputs.target_version }}
          pr_number: ${{ inputs.pr_number }}
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
