name: Release
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: Publish
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build Dist
        run: npm run build

      - name: Configure npm for OIDC authentication
        run: |
          echo "=== Configuring npm for OIDC ==="
          npm config set registry=https://registry.npmjs.org
          npm config list
          echo "npm configuration complete"

      - name: Debug - Log GitHub Actions Context
        run: |
          echo "=== GitHub Actions Context ==="
          echo "Job Environment: ${{ job.environment }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Ref: ${{ github.ref }}"
          echo "Workflow: ${{ github.workflow }}"

      - name: Debug - Decode and Log OIDC Token Claims
        run: |
          echo "=== OIDC Token Claims ==="
          TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL" | jq -r '.token')
          if [ ! -z "$TOKEN" ]; then
            echo "Token payload (decoded):"
            echo "$TOKEN" | cut -d. -f2 | base64 -d | jq '.' || echo "Failed to decode token"
          else
            echo "Failed to retrieve OIDC token"
          fi
        env:
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}

      - name: Debug - Log npm Configuration before publish
        run: |
          echo "=== npm Configuration ==="
          npm config get registry
          npm config get @narmi:registry
          npm config list --location=project
          echo "=== npm Auth Check ==="
          npm whoami || echo "Not authenticated yet"
          echo "=== npm view @narmi/design-system ==="
          npm view @narmi/design-system version

      - name: Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release --verbose
